<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hirey · your professional network, powered by Hi</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- top navigation -->
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="#/" aria-label="Home">
        <span class="brand-logo">Hi</span>
      </a>
      <form class="searchbox" id="nav-search" autocomplete="off">
        <svg viewBox="0 0 24 24" class="ico"><path d="M21 21l-4.3-4.3M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="nav-search-input" type="text" placeholder="Search people and listings" aria-label="Search" />
      </form>
      <nav class="navlinks" id="navlinks">
        <a data-nav="home" href="#/">
          <svg viewBox="0 0 24 24" class="ico"><path d="M3 11l9-8 9 8M5 10v10h14V10" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          <span>Home</span>
        </a>
        <a data-nav="network" href="#/network">
          <svg viewBox="0 0 24 24" class="ico"><path d="M9 11a3 3 0 100-6 3 3 0 000 6zM17 11a3 3 0 100-6 3 3 0 000 6zM3 20v-1a4 4 0 014-4h4a4 4 0 014 4v1M15 15h2a4 4 0 014 4v1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>My Network</span>
        </a>
        <a data-nav="messaging" href="#/messaging">
          <svg viewBox="0 0 24 24" class="ico"><path d="M4 5h16v11H8l-4 3V5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
          <span>Messaging</span>
        </a>
        <a data-nav="me" href="#/me" class="nav-me">
          <span class="nav-avatar" id="nav-avatar">Hi</span>
          <span>Me</span>
        </a>
      </nav>
    </div>
  </header>

  <main id="app" class="container"><div class="loading">Loading your network…</div></main>

  <!-- compose / reach-out modal -->
  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="modal-title">Send a message</h3>
        <button class="icon-btn" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
