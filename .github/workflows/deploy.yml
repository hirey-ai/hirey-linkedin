name: Deploy demo origin

# Auto-deploy the Hirey Hub demo origin (hub.hirey.ai) on every push to main.
# No SSH / no inbound ports: GitHub OIDC -> IAM role -> SSM RunShellScript on the
# EC2 origin box, which git-pulls this repo and runs deploy/update-demo-origin.sh.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # request the OIDC token for AWS
  contents: read

concurrency:
  group: deploy-demo-origin
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  INSTANCE_ID: i-07bfeac7ac107534a

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::573678215058:role/gha-hirey-linkedin-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "GHA deploy ${GITHUB_SHA::7}" \
            --parameters '{"commands":["set -euo pipefail","export HOME=/root","git config --system --replace-all safe.directory /opt/hirey-linkedin","git config --system --add safe.directory /opt/hirey-tasks","git config --system --add safe.directory /opt/hirey-vc","cd /opt/hirey-linkedin","git pull --ff-only","bash deploy/update-demo-origin.sh","echo SSM_DEPLOY_OK"]}' \
            --query Command.CommandId --output text)
          echo "CommandId=$CMD_ID"
          STATUS=Pending
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || echo Pending)
            echo "[$i] status=$STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 5
          done
          echo "----- stdout -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text || true
          echo "----- stderr -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text || true
          test "$STATUS" = "Success"

      - name: Verify live demo
        run: |
          set -euo pipefail
          # Grep the whole page body (titles may carry attributes), retry for restart.
          check() {  # $1=id  $2=needle
            local body=""
            for i in $(seq 1 6); do
              body=$(curl -fsS -m 25 "https://hub.hirey.ai/$1/demo/" || true)
              if printf '%s' "$body" | grep -qi "$2"; then
                echo "  $1/demo OK (matched: $2)"
                return 0
              fi
              echo "  [$i] $1/demo not ready (want: $2)"
              sleep 5
            done
            echo "::error::/$1/demo did not contain '$2'"
            return 1
          }
          check 1005 'professional network'   # Hirey LinkedIn (default)
          check 1007 'Hirey VC'               # Hirey VC
          check 1011 'Hirey Tasks'            # Hirey Tasks
          echo "Live demo verified: 1005=LinkedIn, 1007=VC, 1011=Tasks"
