name: Deploy demo origin

# Auto-deploy the Hirey Hub demo origin (hub.hirey.ai) on every push to main.
# No SSH / no inbound ports: GitHub OIDC -> IAM role -> SSM RunShellScript on the
# EC2 origin box, which git-pulls this repo and runs deploy/update-demo-origin.sh.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # request the OIDC token for AWS
  contents: read

concurrency:
  group: deploy-demo-origin
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  INSTANCE_ID: i-07bfeac7ac107534a

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::573678215058:role/gha-hirey-linkedin-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "GHA deploy ${GITHUB_SHA::7}" \
            --parameters '{"commands":["set -euo pipefail","export HOME=/root","git config --system --replace-all safe.directory /opt/hirey-linkedin","git config --system --add safe.directory /opt/hirey-vc","cd /opt/hirey-linkedin","git pull --ff-only","bash deploy/update-demo-origin.sh","echo SSM_DEPLOY_OK"]}' \
            --query Command.CommandId --output text)
          echo "CommandId=$CMD_ID"
          STATUS=Pending
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query Status --output text 2>/dev/null || echo Pending)
            echo "[$i] status=$STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 5
          done
          echo "----- stdout -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardOutputContent --output text || true
          echo "----- stderr -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query StandardErrorContent --output text || true
          test "$STATUS" = "Success"

      - name: Verify live demo
        run: |
          set -euo pipefail
          vc=""
          for i in $(seq 1 6); do
            vc=$(curl -fsS -m 25 https://hub.hirey.ai/1007/demo/ | grep -oiE '<title>[^<]*</title>' | head -1 || true)
            echo "[$i] 1007/demo -> ${vc:-<none>}"
            echo "$vc" | grep -qi 'Hirey VC' && break
            sleep 5
          done
          li=$(curl -fsS -m 25 https://hub.hirey.ai/1005/demo/ | grep -oiE '<title>[^<]*</title>' | head -1 || true)
          echo "1005/demo -> ${li:-<none>}"
          echo "$vc" | grep -qi 'Hirey VC' || { echo "::error::/1007/demo did not return Hirey VC"; exit 1; }
          echo "$li" | grep -qi 'professional network' || { echo "::error::/1005/demo no longer returns Hirey LinkedIn"; exit 1; }
          echo "Live demo verified: 1007=VC, 1005=LinkedIn"
